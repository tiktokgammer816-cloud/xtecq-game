<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xtecq Live Interaction - Mini Game Console</title>
    <style>
        /* 这里的样式是为了让页面看起来像一个高科技的游戏控制台 */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #121212; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }
        .game-box {
            border: 2px solid #fe2c55;
            padding: 40px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.05);
            text-align: center;
            box-shadow: 0 0 20px #fe2c55;
            width: 80%;
            max-width: 500px;
        }
        h1 { color: #fe2c55; margin-bottom: 10px; font-size: 28px; }
        .status-panel {
            background: #000;
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
            border-left: 5px solid #25f4ee;
            font-family: monospace;
            min-height: 50px;
        }
        .btn-simulate {
            background: linear-gradient(45deg, #fe2c55, #25f4ee);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .btn-simulate:hover { transform: scale(1.1); box-shadow: 0 0 15px #25f4ee; }
        .footer {
            margin-top: 40px;
            font-size: 13px;
            color: #888;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="game-box">
        <h1>XTECQ LIVE</h1>
        <p>TikTok Interactive Mini-Game Engine</p>
        
        <div class="status-panel" id="log">
            SYSTEM READY: Awaiting TikTok Live Signal...
        </div>

        <button class="btn-simulate" onclick="simulateGift()">Simulate Gift Trigger</button>
    </div>

    <div class="footer">
        <strong>Official Domain: xtecq.com</strong><br>
        Copyright © 2026 <strong>West Corporate Sdn Bhd</strong>. All Rights Reserved.<br>
        Business Registration No: [202201018243 (1463940-U)] (Malaysia)
    </div>

<script>
    // 模拟互动的简单代码
    function simulateGift() {
        const log = document.getElementById('log');
        const gifts = ['Rose', 'Galaxy', 'Heart', 'TikTok Lion'];
        const randomGift = gifts[Math.floor(Math.random() * gifts.length)];
        
        log.innerHTML = `<span style="color:#25f4ee">> RECEIVED: ${randomGift}!</span><br><span style="color:#fe2c55">> ACTION: Spawning Game Units...</span>`;
        
        setTimeout(() => {
            log.innerHTML = "SYSTEM READY: Awaiting TikTok Live Signal...";
        }, 3000);
    }
</script>

</body>
</html>
